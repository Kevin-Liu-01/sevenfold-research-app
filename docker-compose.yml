services:
  latex-service:
    build:
      context: .
      dockerfile: latex-service/Dockerfile
    image: latex-service:dev
    ports:
      - "8081:8081"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: harbor-api:dev
    depends_on:
      latex-service:
        condition: service_started
    environment:
      LATEX_SERVICE_URL: http://latex-service:8081
    env_file:
      - ./api/.env
    ports:
      - "8080:8080"
    restart: unless-stopped
