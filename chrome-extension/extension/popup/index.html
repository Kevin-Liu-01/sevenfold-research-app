<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Research Library</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Research Library</h1>
      <p class="hint">Connect your Supabase account to start saving PDFs.</p>
      <div class="actions">
        <button id="login-button">Sign in</button>
        <button id="logout-button" class="secondary">Sign out</button>
      </div>
      <section class="email-auth">
        <h2>Email login</h2>
        <label class="field">
          <span>Email</span>
          <input id="email-input" type="email" placeholder="you@example.com" autocomplete="email" />
        </label>
        <label class="field">
          <span>Password</span>
          <input id="password-input" type="password" placeholder="••••••••" autocomplete="current-password" />
        </label>
        <button id="email-login-button" class="primary">Sign in with email</button>
      </section>
      <p id="status" class="status">Checking session…</p>
    </main>
    <script src="popup.js" defer></script>
  </body>
</html>
